name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  lint_validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/env/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive ../..

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infrastructure

  plan:
    runs-on: ubuntu-latest
    needs:
      - lint_validate
      - security_scan
    defaults:
      run:
        working-directory: infrastructure/env/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: >
          terraform plan
          -input=false
          -lock=false
          -var="candidate_email=${{ secrets.CANDIDATE_EMAIL }}"
          -var="github_repo_url=${{ github.server_url }}/${{ github.repository }}"
          -var="test_user_password=${{ secrets.TEST_USER_PASSWORD }}"

  test_execution_placeholder:
    runs-on: ubuntu-latest
    needs:
      - plan
    steps:
      - name: Placeholder for post-deployment test execution
        run: |
          echo "python tests/test_endpoints.py --user-pool-client-id <client-id> --user-pool-id <user-pool-id> --username <email> --password <password> --api-us-east-1 <url> --api-eu-west-1 <url>"
